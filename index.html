    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <title>Sistema de Pré-Cadastro</title>
    <meta name="description" content="Sistema mobile de pré-cadastro de clientes com captura de fichas de atendimento" />
    <meta name="author" content="Lovable" />

    <meta property="og:title" content="Sistema de Pré-Cadastro" />
    <meta property="og:description" content="Sistema mobile de pré-cadastro de clientes" />

    <meta name="twitter:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />
  </head>

  <body>
    <script>
      (function() {
        var saved = localStorage.getItem('theme');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (saved === 'dark' || (!saved && prefersDark)) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
